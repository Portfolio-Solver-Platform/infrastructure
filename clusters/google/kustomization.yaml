---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../prod/
  - ./database-storage-class.yaml

patches:
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: bootstrap
        namespace: flux-system
      spec:
        path: ./bootstrap/google/
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: foundation
        namespace: flux-system
      spec:
        path: ./foundation/google/
