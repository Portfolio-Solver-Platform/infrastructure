apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: solver-director
  namespace: psp
spec:
  interval: 5m
  targetNamespace: psp
  chart:
    spec:
      chart: ./charts/solver-director/
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    fullnameOverride: solver-director
    image: ghcr.io/portfolio-solver-platform/solver-director:main-ad3d0221-20260317135537
    service:
      name: solver-director
