apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: user
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/user.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: user
  namespace: psp
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: user
        namespace: flux-system
  values:
    image: ghcr.io/portfolio-solver-platform/user:main-b9f68c33-20260324130342
    service:
      name: user
