---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base/

patches:
  - patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: solver-director
        namespace: psp
      spec:
        chart:
          spec:
            valuesFiles:
              - ./helm/app/values.yaml
              - ./helm/app/values-dev.yaml
