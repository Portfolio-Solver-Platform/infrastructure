---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/Portfolio-Solver-Platform/infrastructure.git
  ref:
    branch: <insert-from-script>
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: <insert-from-script>
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
