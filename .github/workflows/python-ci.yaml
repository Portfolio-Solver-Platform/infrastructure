name: CI
on:
  workflow_call:
    inputs:
      image_name:
        description: 'The name of the Docker image (e.g., user)'
        required: false
        type: string
        default: "local-ci"
      image_tag:
        description: 'The image tag'
        required: false
        type: string
      code_audit_targets:
        description: 'Folders or files to scan with Bandit (space-separated)'
        required: false
        type: string
        default: "."

permissions:
  contents: read

env:
  CI_IMAGE: ${{ inputs.image_name }}:${{ inputs.image_tag || github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          target: dev
          tags: ${{ env.CI_IMAGE }}
          load: true
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Lint
        run: docker run --rm $CI_IMAGE ruff check . --no-cache

      - name: Test
        run: docker run --rm $CI_IMAGE pytest -q -p no:cacheprovider

      - name: Audit code
        run: docker run --rm $CI_IMAGE bandit ${{ inputs.code_audit_targets }} -qrx ./tests

      - name: Dependency audit
        run: docker run --rm $CI_IMAGE pip-audit  --ignore-vuln GHSA-48p4-8xcf-vxj5 --ignore-vuln GHSA-pq67-6m6q-mj2v

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .trivycache
          key: ${{ runner.os }}-trivy-db
          restore-keys: ${{ runner.os }}-trivy-

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          vuln-type: "os,library"
          ignore-unfixed: false
          cache-dir: .trivycache
          skip-files: "**/google/auth/crypt/__pycache__/**"
