name: CI
on:
  workflow_call:
    inputs:
      image_name:
        description: 'The name of the Docker image (e.g., user)'
        required: false
        type: string
        default: "local-ci"
      image_tag:
        description: 'The image tag'
        required: false
        type: string
      code_audit_targets:
        description: 'Folders or files to scan with Bandit (space-separated)'
        required: false
        type: string
        default: "."

permissions:
  contents: read

env:
  CI_IMAGE: ${{ inputs.image_name }}:${{ inputs.image_tag || github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: dev
          tags: ${{ env.CI_IMAGE }}
          load: true
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Lint
        run: docker run --rm $CI_IMAGE ruff check . --no-cache

      - name: Test
        run: docker run --rm $CI_IMAGE pytest -q -p no:cacheprovider

      - name: Audit code
        run: docker run --rm $CI_IMAGE bandit ${{ inputs.code_audit_targets }} -qrx ./tests

      - name: Dependency audit
        run: docker run --rm $CI_IMAGE pip-audit  --ignore-vuln GHSA-48p4-8xcf-vxj5 --ignore-vuln GHSA-pq67-6m6q-mj2v

      - name: Cache Trivy DB
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .trivycache
          key: ${{ runner.os }}-trivy-db
          restore-keys: ${{ runner.os }}-trivy-

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          vuln-type: "os,library"
          ignore-unfixed: false
          cache-dir: .trivycache
          skip-files: "**/google/auth/crypt/__pycache__/**"
