name: Auto-merge CI Image Updates

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    if: github.actor_id == vars.INFRASTRUCTURE_BOT_ACTOR_ID
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check auto-merge eligibility
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Only one file is allowed to be changed
          gh pr diff $PR_NUMBER --name-only > changed_files.txt
          FILE_COUNT=$(wc -l < changed_files.txt | tr -d ' ')
          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "PR modified $FILE_COUNT files. Only exactly 1 file is allowed."
            exit 0
          fi

          # The file has to be inside of the apps/ directory
          CHANGED_FILE=$(cat changed_files.txt)
          if [[ ! "$CHANGED_FILE" == apps/* ]]; then
            echo "Modified file is outside the 'apps/' directory: $CHANGED_FILE"
            exit 0
          fi

          # Analyse changes made to the file through git diff
          gh pr diff $PR_NUMBER > pr.diff
          echo "Diff:"
          cat pr.diff

          # Restrict number of additions and deletions to exactly 1.
          # I.e., only allow one line to change,
          # though technically, this would also match for removing one and adding another.
          echo "Checking for number of additions and deletions"
          ADDITIONS=$(awk '/^\+/ && !/^\+\+\+/ {count++} END {print count+0}' pr.diff)
          DELETIONS=$(awk '/^\-/ && !/^\-\-\-/ {count++} END {print count+0}' pr.diff)
          if [ "$ADDITIONS" -ne 1 ] || [ "$DELETIONS" -ne 1 ]; then
            echo "PR must contain exactly 1 addition and 1 deletion."
            echo "Found $ADDITIONS additions and $DELETIONS deletions."
            exit 0
          fi

          # Extract both the added and deleted lines, and make sure they only update the image tag
          echo "Checking that only the image tag is changed"
          ADDED_LINE=$(awk '/^\+/ && !/^\+\+\+/ {print}' pr.diff)
          DELETED_LINE=$(awk '/^\-/ && !/^\-\-\-/ {print}' pr.diff)

          # Define the regex patterns for the added and deleted lines.
          COMMON_REGEX='[[:space:]]*image:[[:space:]]*([a-zA-Z0-9_./-]+):([a-zA-Z0-9_-]+)[[:space:]]*$'
          REGEX_ADDED='^\+'"${COMMON_REGEX}"
          REGEX_DELETED='^\-'"${COMMON_REGEX}"

          # Validate added line and extract path/tag
          if [[ "$ADDED_LINE" =~ $REGEX_ADDED ]]; then
            ADDED_PATH="${BASH_REMATCH[1]}"
            ADDED_TAG="${BASH_REMATCH[2]}"
          else
            echo "The modified line does not match the 'image: <path>:<tag>' format."
            echo "The line is: $ADDED_LINE"
            exit 0
          fi

          # Validate deleted line and extract path/tag
          if [[ "$DELETED_LINE" =~ $REGEX_DELETED ]]; then
            DELETED_PATH="${BASH_REMATCH[1]}"
            DELETED_TAG="${BASH_REMATCH[2]}"
          else
            echo "The deleted line does not match the 'image: <path>:<tag>' format."
            echo "The line is: $DELETED_LINE"
            exit 0
          fi

          # Make sure the image path of the added line and the deleted line is the same.
          # I.e., don't auto-merge a complete image change.
          if [ "$ADDED_PATH" != "$DELETED_PATH" ]; then
            echo "The image path was modified. Only tag updates are allowed."
            echo "Old path: $DELETED_PATH"
            echo "New path: $ADDED_PATH"
            exit 0
          fi

          # Check the registry is the one expected
          EXPECTED_REGISTRY="ghcr.io/portfolio-solver-platform/"
          if [[ "$ADDED_PATH" != "$EXPECTED_REGISTRY"* ]]; then
            echo "The image path does not match the expected registry."
            echo "Expected prefix: $EXPECTED_REGISTRY"
            echo "Actual path: $ADDED_PATH"
            exit 0
          fi

          # Check that the image is the expected format
          # The '#' tells Bash to remove the $EXPECTED_REGISTRY prefix from the string
          IMAGE_NAME="${ADDED_PATH#$EXPECTED_REGISTRY}"
          if [[ ! "$IMAGE_NAME" =~ ^[a-zA-Z-]+$ ]]; then
            echo "The image name '$IMAGE_NAME' contains invalid characters."
            echo "Only letters (a-z, A-Z) and hyphens (-) are allowed."
            exit 0
          fi

          # Make sure the tag changed
          if [ "$ADDED_TAG" == "$DELETED_TAG" ]; then
            echo "The image tag is identical to the previous one."
            exit 0
          fi

          echo "✅ Validation passed"
          echo "merge_safe=true" >> "$GITHUB_OUTPUT"

      - name: Approve and Merge PR
        if: steps.verify.outputs.merge_safe == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --squash --admin "$PR_URL"
