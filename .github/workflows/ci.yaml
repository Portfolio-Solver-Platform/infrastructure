name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install environment
        run: nix develop .#ci

      - name: Lint YAML
        run: nix develop .#ci --command yamllint .

      - name: Validate
        run: nix develop .#ci --command ./tests/validate-flux.sh
