name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3.17.3

      - name: Install environment
        run: nix develop .#ci

      - name: Run checks
        run: nix develop .#ci --command pre-commit run -a

  required:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Check dependency status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "Failing: One or more upstream jobs failed, were cancelled, or skipped."
          exit 1

      - name: Mark as successful
        run: echo "All required jobs have passed!"
