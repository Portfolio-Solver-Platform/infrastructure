name: Push Docker image and deploy

on:
  workflow_call:
    inputs:
      image_name:
        description: 'The name of the Docker image (e.g., user)'
        required: true
        type: string
      file_name:
        description: 'The manifest file name in the infrastructure repo in the apps/base/ folder (e.g., user.yaml)'
        required: true
        type: string
      infrastructure_bot_id:
        description: 'App ID for the Infrastructure Bot. Uses a default if not provided'
        required: false
        type: string
      registry:
        description: 'The container registry to push to'
        required: false
        type: string
        default: 'ghcr.io/portfolio-solver-platform'
      main_branch_name:
        description: 'The branch name that receives the latest tag'
        required: false
        type: string
        default: 'main'
    secrets:
      infrastructure_bot_private_key:
        description: 'Private key for the Infrastructure Bot'
        required: true

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE_NAME: ${{ inputs.image_name }}
      FILE_NAME: ${{ inputs.file_name }}
      MAIN_BRANCH_NAME: ${{ inputs.main_branch_name }}

    steps:
      - name: Generate build ID
        id: prep
        run: |
          branch=${GITHUB_REF_NAME//\//-}
          sha=${GITHUB_SHA::8}
          ts=$(date +'%Y%m%d%H%M%S')
          echo "BUILD_TAG=${branch}-${sha}-${ts}" >> $GITHUB_ENV

      - name: Generate Tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_TAG }}"
          TAGS="$IMAGE"

          if [ "$GITHUB_REF_NAME" == "${{ env.MAIN_BRANCH_NAME }}" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "Building from main branch. 'latest' tag will be applied."
          fi

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "DOCKER_TAGS=$TAGS" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          pull: true
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Generate app token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ inputs.infrastructure_bot_id || vars.INFRASTRUCTURE_BOT_ID }}
          private-key: ${{ secrets.infrastructure_bot_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: infrastructure

      - name: Checkout infrastructure repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Portfolio-Solver-Platform/infrastructure
          token: ${{ steps.app-token.outputs.token }}
          path: infrastructure

      - name: Update image tag in manifests
        run: |
          cd infrastructure/apps/base/
          yq -i ".spec.values.image = \"$IMAGE\"" ${{ env.FILE_NAME }}

      - name: Create pull request in infrastructure repo
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          path: infrastructure
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(image-update): update ${{ env.IMAGE_NAME }} image to ${{ env.BUILD_TAG }}"
          branch: "update-image/${{ env.IMAGE_NAME }}-${{ env.BUILD_TAG }}"
          title: "chore: update ${{ env.IMAGE_NAME }} image"
          body: |
            Automated image update for the `${{ env.IMAGE_NAME }}` image.
            **New Tag:** `${{ env.BUILD_TAG }}`

            This PR was generated by the CI pipeline.
          author: "psp-infrastructure-bot[bot] <psp-infrastructure-bot[bot]@users.noreply.github.com>"
          committer: "psp-infrastructure-bot[bot] <psp-infrastructure-bot[bot]@users.noreply.github.com>"
