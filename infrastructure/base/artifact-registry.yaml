apiVersion: v1
kind: Namespace
metadata:
  name: harbor
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: artifact-registry
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/solver-artifact-registry.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: artifact-registry
  namespace: harbor
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: artifact-registry
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: artifact-registry-setup
  namespace: flux-system
spec:
  interval: 10m
  path: ./terraform

  approvePlan: "auto" # Auto apply without approval
  retryInterval: 20s

  sourceRef:
    kind: GitRepository
    name: artifact-registry
    namespace: flux-system
