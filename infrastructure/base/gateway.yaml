---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway-routes
  namespace: nginx-gateway
spec:
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./charts/routes/
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: gateway
        namespace: flux-system
  values:
    keycloak:
      hostname: ${DOMAIN_AUTH}
    grafana:
      hostname: ${DOMAIN_MONITORING}
    secretsManager:
      hostname: ${DOMAIN_SECRETS}
