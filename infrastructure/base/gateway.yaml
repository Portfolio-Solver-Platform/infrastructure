---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-gateway
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/gateway.git
  ref:
    branch: wip-istio
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway-routes
  namespace: nginx-gateway
spec:
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./charts/routes/
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: gateway
        namespace: flux-system
  values:
    keycloak:
      hostname: ${DOMAIN_AUTH}
    grafana:
      hostname: ${DOMAIN_MONITORING}
    secretsManager:
      hostname: ${DOMAIN_SECRETS}
