---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
  # labels:
  #   psp.io/encrypt: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-gateway
  # labels:
  #   psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/gateway.git
  ref:
    branch: wip-add-dep
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: nginx-gateway
spec:
  interval: 10m
  path: ./crds
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: gateway
    namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway
  namespace: nginx-gateway
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/nginx-gateway-fabric/
      sourceRef:
        kind: GitRepository
        name: gateway
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway-routes
  namespace: nginx-gateway
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/routes/
      sourceRef:
        kind: GitRepository
        name: gateway
        namespace: flux-system
