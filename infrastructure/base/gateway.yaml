---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
  labels:
    psp.io/encrypt: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-gateway
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/gateway.git
  ref:
    branch: wip-istio
