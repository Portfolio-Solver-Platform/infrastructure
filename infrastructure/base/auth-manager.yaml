apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: auth-manager
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/keycloak.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-manager
  namespace: keycloak
spec:
  interval: 5m
  driftDetection:
    mode: warn
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: auth-manager
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: keycloak-setup
  namespace: flux-system
spec:
  interval: 10m
  path: ./terraform
  serviceAccountName: tofu-runner-auth-manager

  approvePlan: "auto" # Auto apply without approval
  retryInterval: 20s

  sourceRef:
    kind: GitRepository
    name: auth-manager
    namespace: flux-system

  varsFrom:
    - kind: Secret
      name: auth-manager-credentials
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tofu-runner-auth-manager
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-runner-auth-manager-baseline
  namespace: flux-system
subjects:
  - kind: ServiceAccount
    name: tofu-runner-auth-manager
    namespace: flux-system
roleRef:
  kind: ClusterRole
  name: tf-runner-role
  apiGroup: rbac.authorization.k8s.io
---
# Make the service account a cluster-admin.
# This is necessary because it creates secrets and roles in other namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tofu-runner-auth-manager-cluster-admin
subjects:
  - kind: ServiceAccount
    name: tofu-runner-auth-manager
    namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: auth-manager-tofu-kv
  namespace: flux-system
spec:
  provider:
    vault:
      server: "http://secrets-manager-openbao.secrets-manager.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "auth-manager-tofu-role"
          serviceAccountRef:
            name: "tofu-runner-auth-manager"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-manager-credentials
  namespace: flux-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: auth-manager-tofu-kv
    kind: SecretStore
  target:
    name: auth-manager-credentials
    creationPolicy: Owner
  data:
    - secretKey: bootstrap_service_client_id
      remoteRef:
        key: "auth-manager/bootstrap-service-credentials"
        property: "clientId"
    - secretKey: bootstrap_service_client_secret
      remoteRef:
        key: "auth-manager/bootstrap-service-credentials"
        property: "clientSecret"
    - secretKey: admin_app_secret
      remoteRef:
        key: "auth-manager/admin-app-credentials"
        property: "secret"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tofu-runner-to-keycloak
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flux-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: tf-runner
    ports:
    - protocol: TCP
      port: 15008
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-to-apiserver
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak-operator
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 443
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-ingress
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak-operator
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: 8080
      protocol: TCP
