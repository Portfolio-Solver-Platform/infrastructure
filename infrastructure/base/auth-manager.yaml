apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: auth-manager
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/keycloak.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-manager
  namespace: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: auth-manager
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: keycloak-setup
  namespace: flux-system
spec:
  interval: 10m
  path: ./terraform

  dependsOn:
    - name: auth-manager
      kind: HelmRelease
      namespace: keycloak

  approvePlan: "auto" # Auto apply without approval

  sourceRef:
    kind: GitRepository
    name: auth-manager
    namespace: flux-system
