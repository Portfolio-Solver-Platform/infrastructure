apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: auth-manager
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/keycloak.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-manager
  namespace: keycloak
spec:
  interval: 5m
  driftDetection:
    mode: warn
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: auth-manager
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: keycloak-setup
  namespace: flux-system
spec:
  interval: 10m
  path: ./terraform
  serviceAccountName: tofu-runner-auth-manager

  approvePlan: "auto" # Auto apply without approval
  retryInterval: 20s

  sourceRef:
    kind: GitRepository
    name: auth-manager
    namespace: flux-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tofu-runner-auth-manager
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-runner-auth-manager-baseline
  namespace: flux-system
subjects:
  - kind: ServiceAccount
    name: tofu-runner-auth-manager
    namespace: flux-system
roleRef:
  kind: ClusterRole
  name: tf-runner-role
  apiGroup: rbac.authorization.k8s.io
---
# Make the service account a cluster-admin.
# This is necessary because it creates secrets and roles in other namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tofu-runner-auth-manager-cluster-admin
subjects:
  - kind: ServiceAccount
    name: tofu-runner-auth-manager
    namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
