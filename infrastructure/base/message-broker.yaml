---
apiVersion: v1
kind: Namespace
metadata:
  name: rabbit-mq
  labels:
    psp.io/encrypt: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: message-broker
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/message-broker.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbit-mq
  namespace: rabbit-mq
spec:
  interval: 5m
  driftDetection:
    mode: enabled
    ignore:
      # Ignore the RabbitmqCluster because it is managed by the RabbitMQ operator
      - target:
          group: rabbitmq.com
          kind: RabbitmqCluster
          name: rabbitmq
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: message-broker
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
