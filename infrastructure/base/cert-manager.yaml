apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/cert-manager.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: cert-manager
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
