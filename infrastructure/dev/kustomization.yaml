---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base/

patches:
  - patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: auth-manager
        namespace: keycloak
      spec:
        chart:
          spec:
            valuesFiles:
              - ./helm/values.yaml
              - ./helm/values-dev.yaml
  - patch: |-
      apiVersion: infra.contrib.fluxcd.io/v1alpha2
      kind: Terraform
      metadata:
        name: keycloak-setup
        namespace: flux-system
      spec:
        vars:
          - name: environment
            value: "dev"
          - name: keycloak_url
            value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
          - name: frontend_url
            value: "http://${DOMAIN_AUTH}"
          - name: enable_password_policy
            value: false
          - name: force_mfa
            value: false
  - patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: gateway
        namespace: gateway
      spec:
        chart:
          spec:
            valuesFiles:
              - ./helm/values.yaml
              - ./helm/values-dev.yaml
  - patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: pod-scheduler
        namespace: pod-scheduler
      spec:
        chart:
          spec:
            valuesFiles:
              - ./helm/values.yaml
              - ./helm/values-dev.yaml
