apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cni
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Portfolio-Solver-Platform/cni.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cni
  namespace: kube-system
spec:
  interval: 5m
  driftDetection:
    mode: warn
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace # update CRDs when upgrading
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
    remediation:
      retries: 3
      remediateLastFailure: true
      strategy: rollback
  chart:
    spec:
      chart: ./helm/
      sourceRef:
        kind: GitRepository
        name: cni
        namespace: flux-system

      reconcileStrategy: Revision # Reconcile on file changes, not Helm chart version changes
      valuesFiles:
        - ./helm/values.yaml
        - ./helm/values-dev.yaml
